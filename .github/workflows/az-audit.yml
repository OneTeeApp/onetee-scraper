name: AZ coverage audit
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/az_audit.py", ".github/workflows/az-audit.yml"]
permissions:
  contents: write
concurrency:
  group: az-audit
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests beautifulsoup4
      - name: Audit
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python scripts/az_audit.py 2>&1 | tee probe-results/az-audit.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/az-audit.txt
          git commit -m "az audit [skip ci]" || exit 0
          git push
