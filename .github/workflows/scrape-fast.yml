name: Scrape tee times (fast, today)

on:
  schedule:
    # TODAY only, every 5 minutes — keeps near-term availability fresh where it
    # matters (popular same-day slots move fast) without the load of a full
    # 3-day scan. GitHub's scheduler is best-effort and often fires late under
    # load, so real cadence is looser than 5 min. The concurrency guard means a
    # run that takes >5 min just makes the next one wait rather than overlap.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-fast          # own group: independent of the hourly full scan
  cancel-in-progress: false

jobs:
  scrape-today:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape + push TODAY to D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          # "today" is a per-timezone question, NOT `date -u` — see
          # scraper/dates.py. Under UTC, every evening after 18:00 MDT this job
          # scraped TOMORROW and left the real local today untouched in D1.
          for DATE in $(python -m scraper.dates --registry registry.json --days 1); do
            echo "::group::scrape+push ${DATE}"
            python -m scraper.aggregate --date "${DATE}" --workers 8 \
              --exclude clubprophet,ezlinks,golfnow,clubcaddie,supersaas \
              --out "output/tee_times_${DATE}.json" || true
            python -m scraper.d1 push --data "output/tee_times_${DATE}.json" || true
            echo "::endgroup::"
          done

      - name: Prune elapsed slots
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: python -m scraper.d1 prune

      - name: Post to OneTee (no-op until ONETEE_API_URL secret is set)
        if: ${{ vars.ONETEE_ENABLED == 'true' }}
        env:
          ONETEE_API_URL: ${{ secrets.ONETEE_API_URL }}
          ONETEE_API_KEY: ${{ secrets.ONETEE_API_KEY }}
        run: |
          for DATE in $(python -m scraper.dates --registry registry.json --days 1); do
            python -m scraper.onetee --data "output/tee_times_${DATE}.json"
          done
