name: Final coverage count
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/final_count.py", ".github/workflows/final-count.yml"]
permissions:
  contents: write
concurrency:
  group: final-count
jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests beautifulsoup4
      - name: Count
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python scripts/final_count.py 2>&1 | tee probe-results/final.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/final.txt
          git commit -m "final count [skip ci]" || exit 0
          git push
