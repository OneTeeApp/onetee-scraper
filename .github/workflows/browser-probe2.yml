name: Browser probe — EZLinks + GolfNow (diagnostic)

# Diagnostic only. Does a real headless Chromium — running from GitHub's
# datacenter IP — naturally load EZLinks / GolfNow, where the plain HTTP client
# is blocked? No stealth, no challenge-solving: we navigate real public pages
# and read what a normal browser engine gets. If a managed challenge auto-clears
# (as cps.golf's did) we see data; if an interactive "verify you are human" wall
# blocks it, the RESULT line says so and we go no further.
#
# The API isn't reachable from the dev sandbox, so the job commits its RESULT
# lines back to probe-results/ for offline inspection. This file + scripts get
# deleted once the question is answered.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/browser_probe2.py"
      - ".github/workflows/browser-probe2.yml"

permissions:
  contents: write

concurrency:
  group: browser-probe2
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Run probe
        run: |
          mkdir -p probe-results
          python scripts/browser_probe2.py 2>&1 | tee "probe-results/latest.txt"
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add probe-results/latest.txt
          git commit -m "probe results [skip ci]" || { echo "no changes"; exit 0; }
          git push
