name: Chronogolf empty-clubs probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/chrono_probe6.py", ".github/workflows/chrono-probe.yml"]
permissions:
  contents: write
concurrency:
  group: chrono-probe
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests beautifulsoup4
      - run: |
          mkdir -p probe-results
          python scripts/chrono_probe6.py 2>&1 | tee probe-results/chrono.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/chrono.txt
          git commit -m "chrono probe [skip ci]" || exit 0
          git push
