name: Scrape Club Caddie via browser (3 days)

# Club Caddie's public widget is session-gated (plain HTTP gets a stub). A real
# Chromium loads the widget, captures the POST it fires to /webapi/TeeTimes
# (CourseId + apikey + session Interaction), then re-POSTs it per date and
# parses the HTML tee sheet. One widget load per course serves all 3 dates.
# The plain scraper excludes clubcaddie, so this job solely owns those slugs.

on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "registry.json"
      - "scraper/browser_clubcaddie.py"
      - ".github/workflows/scrape-clubcaddie-browser.yml"

permissions:
  contents: read

concurrency:
  group: scrape-clubcaddie-browser
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Scrape 3 days (one widget load per course) + push each to D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          START=$(date -u +%F)
          python -m scraper.browser_clubcaddie --date "${START}" --days 3 \
            --out-dir output || true
          for OFFSET in 0 1 2; do
            DATE=$(date -u -d "+${OFFSET} days" +%F)
            python -m scraper.d1 push --data "output/cc_${DATE}.json" || true
          done
