name: Scrape Club Caddie via browser (3 days)

# Club Caddie's public widget renders the tee sheet server-side into HTML and
# session-gates its endpoint (plain HTTP gets a "session expired" stub). A real
# Chromium loads the widget, sets the date filter, clicks Search, and scrapes
# the rendered cards — the same public page a golfer uses, no login/CAPTCHA.
# The plain scraper excludes clubcaddie, so this job solely owns those slugs.

on:
  schedule:
    - cron: "22 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/browser_clubcaddie.py"
      - ".github/workflows/scrape-clubcaddie-browser.yml"

permissions:
  contents: read

concurrency:
  group: scrape-clubcaddie-browser
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Scrape + push each date to D1 (today + next 2 days)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          for OFFSET in 0 1 2; do
            DATE=$(date -u -d "+${OFFSET} days" +%F)
            echo "::group::clubcaddie browser ${DATE}"
            python -m scraper.browser_clubcaddie --date "${DATE}" \
              --out "output/cc_${DATE}.json" || true
            python -m scraper.d1 push --data "output/cc_${DATE}.json" || true
            echo "::endgroup::"
          done
