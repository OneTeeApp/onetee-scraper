name: Coverage audit (registry vs D1)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/coverage_audit.py"
      - ".github/workflows/coverage-audit.yml"

permissions:
  contents: write

concurrency:
  group: coverage-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests beautifulsoup4
      - name: Run audit
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python scripts/coverage_audit.py 2>&1 | tee probe-results/coverage.txt
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/coverage.txt
          git commit -m "coverage audit [skip ci]" || { echo "no changes"; exit 0; }
          git push
