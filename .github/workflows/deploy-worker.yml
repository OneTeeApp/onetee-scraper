name: Deploy Worker API

# Deploys the Cloudflare Worker (worker/) with `wrangler deploy`, using the same
# secrets as the scraper. The repo's wrangler.toml keeps a placeholder D1 id; the
# real id is injected here from CLOUDFLARE_D1_DB_ID so it never lives in git.
# After deploying, it self-verifies the venue fix (a re-tagged CO course must
# come back ONCE with its native platform) and commits the result for polling.
#
# NOTE: this needs CLOUDFLARE_API_TOKEN to have the "Workers Scripts:Edit"
# permission. The scraper's token may be D1-only — if deploy fails on auth, the
# committed probe-results/deploy.txt will say so, and the token needs that scope
# added (or a separate secret).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"

permissions:
  contents: write

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject real D1 id + deploy
        id: deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          cd worker
          sed -i "s/REPLACE_WITH_YOUR_D1_DATABASE_ID/${CLOUDFLARE_D1_DB_ID}/" wrangler.toml
          # deploy; capture all output (incl. the published workers.dev URL)
          npx --yes wrangler@3 deploy 2>&1 | tee ../deploy.log

      - name: Verify live venue fix + record result
        if: always()
        run: |
          mkdir -p probe-results
          {
            echo "=== deploy log (tail) ==="
            tail -n 25 deploy.log 2>/dev/null || echo "(no deploy log — step failed early)"
            URL=$(grep -oE "https://[a-z0-9.-]+\.workers\.dev" deploy.log 2>/dev/null | head -1)
            echo
            echo "deployed URL: ${URL:-UNKNOWN}"
            if [ -n "$URL" ]; then
              echo
              echo "=== GET ${URL}/api/health ==="
              curl -s --max-time 20 "${URL}/api/health" || echo "(health fetch failed)"
              echo
              echo "=== GET ${URL}/api/courses?state=CO  (arrowhead / bella ridge should each appear ONCE, native platform) ==="
              curl -s --max-time 20 "${URL}/api/courses?state=CO" \
                | python3 -c "import sys,json; cs=json.load(sys.stdin)['courses']; [print(' ',c['course_slug'],'|',c.get('platform'),'|',c.get('slots'),'slots |',c.get('state')) for c in cs if 'arrowhead' in c['course_slug'] or 'bella-ridge' in c['course_slug'] or 'cedaredge' in c['course_slug']]" \
                || echo "(courses fetch/parse failed)"
              echo
              echo "duplicate-check: count of course_slugs containing '-golfnow' (should be 0):"
              curl -s --max-time 20 "${URL}/api/courses?state=CO" \
                | python3 -c "import sys,json; cs=json.load(sys.stdin)['courses']; print(' ', sum('-golfnow' in c['course_slug'] for c in cs))" \
                || echo "(dup check failed)"
            fi
          } 2>&1 | tee probe-results/deploy.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/deploy.txt
          git commit -m "worker deploy result [skip ci]" || exit 0
          git push

      - name: Fail if deploy errored
        if: steps.deploy.outcome != 'success'
        run: |
          echo "wrangler deploy did not succeed — see probe-results/deploy.txt"
          exit 1
