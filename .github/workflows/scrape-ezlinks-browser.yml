name: Scrape EZLinks via browser (3 days)

# EZLinks portals sit behind Cloudflare that blocks the plain HTTP client's TLS
# fingerprint from datacenter IPs. A real headless Chromium clears the *managed*
# JS challenge on its own (no interactive step) and the page's own origin then
# returns full JSON — verified: Aurora 373 slots, Pine Creek 144. The plain
# scraper excludes ezlinks, so this job solely owns those course_slugs in D1.
# Hourly: portal availability isn't as volatile as same-day popular slots, and
# spinning up Chromium every 5 min would be wasteful.

on:
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "registry.json"
      - "scraper/browser_ezlinks.py"
      - "scraper/adapters/ezlinks.py"
      - ".github/workflows/scrape-ezlinks-browser.yml"

permissions:
  contents: read

concurrency:
  group: scrape-ezlinks-browser
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Scrape + push each date to D1 (today + next 2 days)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          for OFFSET in 0 1 2; do
            DATE=$(date -u -d "+${OFFSET} days" +%F)
            echo "::group::ezlinks browser ${DATE}"
            python -m scraper.browser_ezlinks --date "${DATE}" \
              --out "output/ez_${DATE}.json" || true
            python -m scraper.d1 push --data "output/ez_${DATE}.json" || true
            echo "::endgroup::"
          done
