name: Scrape tee times (full, 3 days)

# Full 3-day scan, hourly at :17. Sharded: the course list is split into N
# deterministic slices (--shard i/N) that run as parallel matrix jobs, so total
# wall-clock stays flat as the registry grows toward ~15k courses. Each shard
# only reads/writes its own courses in D1 (the sync is course-scoped), so shards
# never contend. Bump SHARDS by widening the matrix list — nothing else changes.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    # Only re-scan when the course list or scraper code changes — not on every
    # doc/workflow/probe commit (each was spawning a full 4-shard scan and
    # saturating the runners).
    paths:
      - "registry.json"
      - "scraper/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: read

# NOTE: matrix context is NOT available in workflow-level concurrency — using
# ${{ matrix.shard }} here made the whole workflow invalid (startup_failure on
# every trigger, cron included), which silently killed the full scan. A static
# group is also the right semantics: one full-scan RUN at a time (its 4 shard
# jobs still run in parallel inside the run).
concurrency:
  group: scrape-full
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]   # N = 4 shards; widen this list to scale out
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape + push shard ${{ matrix.shard }}/4 (today + next 2 days)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          for OFFSET in 0 1 2; do
            DATE=$(date -u -d "+${OFFSET} days" +%F)
            OUT="output/tee_times_${DATE}_s${{ matrix.shard }}.json"
            echo "::group::scrape+push ${DATE} shard ${{ matrix.shard }}"
            python -m scraper.aggregate --date "${DATE}" --workers 10 \
              --shard "${{ matrix.shard }}/4" \
              --exclude clubprophet,ezlinks,golfnow,clubcaddie,supersaas \
              --out "${OUT}" || true
            python -m scraper.d1 push --data "${OUT}" || true
            echo "::endgroup::"
          done

      - name: Upload raw results as artifact (7-day debugging trail)
        uses: actions/upload-artifact@v4
        with:
          name: tee-times-${{ github.run_id }}-s${{ matrix.shard }}
          path: output/tee_times_*.json
          retention-days: 7
