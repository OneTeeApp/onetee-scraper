name: AZ diagnostic
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/az_diag.py", ".github/workflows/az-diag.yml"]
permissions:
  contents: write
concurrency:
  group: az-diag
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests beautifulsoup4
      - run: |
          mkdir -p probe-results
          python scripts/az_diag.py 2>&1 | tee probe-results/az-diag.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/az-diag.txt
          git commit -m "az diag [skip ci]" || exit 0
          git push
