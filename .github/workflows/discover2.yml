name: Discovery probe 2 (booking-system remap)

# Verifies the July-2026 booking-URL research: chronogolf/foreup ground truth
# via the real adapters (plain HTTP), and browser-side pinning/API-capture for
# new cps tenants, the Heritage Eagle Bend EZLinks portal, Noteefy, ForeTees.
# Commits RESULT lines to probe-results/. Deleted once IDs are pinned.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/discover2_plain.py"
      - "scripts/discover2_browser.py"
      - ".github/workflows/discover2.yml"

permissions:
  contents: write

concurrency:
  group: discover2
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium
      - name: Run probes
        run: |
          mkdir -p probe-results
          python scripts/discover2_plain.py 2>&1 | tee probe-results/discover2.txt
          python scripts/discover2_browser.py 2>&1 | tee -a probe-results/discover2.txt
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/discover2.txt
          git commit -m "discover2 results [skip ci]" || { echo "no changes"; exit 0; }
          git push
