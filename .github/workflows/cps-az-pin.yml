name: CPS AZ pin probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/cps_az_pin.py", ".github/workflows/cps-az-pin.yml"]
permissions:
  contents: write
concurrency:
  group: cps-az-pin
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - run: |
          mkdir -p probe-results
          python scripts/cps_az_pin.py 2>&1 | tee probe-results/cps-az.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/cps-az.txt
          git commit -m "cps-az pin [skip ci]" || exit 0
          git push
