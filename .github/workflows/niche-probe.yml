name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install deps + Chromium
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium
      - name: Diagnose the 2 empty natives (Ironbridge foreup, Arrowhead ezlinks) over 7 days
        run: |
          mkdir -p probe-results output
          {
            echo "### Ironbridge foreUP: what IDs does course 20595's booking page expose? ###"
            python - <<'PY'
          import datetime as dt
          from scraper.adapters.foreup import ForeUpAdapter
          a=ForeUpAdapter()
          try:
            found=a.discover_ids("20595")
            print("  discover_ids(20595):",found)
          except Exception as e:
            print("  discover_ids err:",type(e).__name__,e)
          # run the real adapter (current ids 20595/5045) across dates
          import json
          c=[x for x in json.load(open("registry.json"))["courses"] if x["slug"]=="ironbridge-golf-club"][0]
          print("  registry ids:",c["ids"])
          for off in [1,2,3,5,7,14]:
            d=dt.date.today()+dt.timedelta(days=off)
            try:
              tt=a.fetch(c,d)
              print(f"    {d}: {len(tt)} times")
            except Exception as e:
              print(f"    {d}: ERR {type(e).__name__}: {e}")
          PY
            echo
            echo "### Arrowhead ezlinks portal probe (arrowheadpp vs alternates) over 7 days ###"
            python - <<'PY'
          import json,datetime as dt
          from scraper.browser_ezlinks import run as ezrun
          base=json.load(open("registry.json"))
          arrow=[c for c in base["courses"] if c["slug"]=="arrowhead-golf-club"][0]
          for portal in ["arrowheadpp","arrowhead","arrowheadsunpp","arrowheadgc"]:
            c=json.loads(json.dumps(arrow))
            c["ids"]["portal"]=portal
            c["slug"]=f"arrowhead-{portal}"
            json.dump({"courses":[c]},open("reg_arrow.json","w"))
            counts={}
            for off in [1,2,3,5,7]:
              d=(dt.date.today()+dt.timedelta(days=off))
              try:
                doc=ezrun(d,"reg_arrow.json",f"output/a_{portal}_{off}.json")
                counts[str(d)]=len(doc["tee_times"])
              except Exception as e:
                counts[str(d)]=f"ERR {type(e).__name__}"
            print(f"  portal={portal}: {counts}")
          PY
          } 2>&1 | tee probe-results/native.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/native.txt
          git commit -m "native-engine diagnostic [skip ci]" || exit 0
          git push
