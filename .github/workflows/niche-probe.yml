name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Browser-fetch SuperSaaS (Spreading Antlers) for next 3 days
        run: |
          mkdir -p probe-results
          {
            for OFFSET in 0 1 2; do
              DATE=$(date -u -d "+${OFFSET} days" +%F)
              echo "=== ${DATE} ==="
              python -m scraper.browser_supersaas --date "${DATE}" --out "output/ss_${DATE}.json" 2>&1
              python -c "import json;d=json.load(open('output/ss_${DATE}.json'));print('slots=',len(d['tee_times']),'errors=',d['errors']);print('sample=',[t['teetime'] for t in d['tee_times'][:5]])"
            done
          } 2>&1 | tee probe-results/supersaas.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/supersaas.txt
          git commit -m "supersaas probe [skip ci]" || exit 0
          git push
