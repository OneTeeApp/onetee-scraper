name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
  cancel-in-progress: true

env:
  API: https://onetee-api.damp-snow-8025.workers.dev

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests

      - name: Verify the deployed Worker end to end
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python - <<'PY' 2>&1 | tee probe-results/liveapi.txt
          import os, datetime as dt, zoneinfo, requests
          from scraper.d1 import D1Rest, prune_past

          API = os.environ["API"]
          def get(path):
              r = requests.get(API + path, timeout=30)
              r.raise_for_status()
              return r.json()

          den = dt.datetime.now(zoneinfo.ZoneInfo("America/Denver")).replace(tzinfo=None)
          phx = dt.datetime.now(zoneinfo.ZoneInfo("America/Phoenix")).replace(tzinfo=None)
          NOW = {"CO": den.isoformat(timespec="seconds"), "AZ": phx.isoformat(timespec="seconds")}
          def now_for(t): return NOW.get(t.get("state") or "CO", NOW["CO"])
          print("now Denver:", NOW["CO"], "| now Phoenix:", NOW["AZ"])
          print("API:", API)

          print("\n== /api/health ==")
          print("  ", get("/api/health"))

          print("\n== 1. PAST TIMES: any returned slot earlier than local now? (want 0) ==")
          tt = get("/api/tee-times?limit=2000")["tee_times"]
          past = [t for t in tt if t["teetime"] < now_for(t)]
          print(f"   {len(tt)} slots returned, {len(past)} in the past")
          for t in past[:5]:
              print("   PAST:", t["course_slug"], t.get("state"), t["teetime"])
          print("   include_past=1 sanity (should be > 0):",
                sum(1 for t in get("/api/tee-times?limit=2000&include_past=1")["tee_times"]
                    if t["teetime"] < now_for(t)))

          print("\n== 2. STATE field ==")
          print("   rows missing state:", sum(1 for t in tt if not t.get("state")))
          print("   ?state=AZ rows that aren't AZ:",
                sum(1 for t in get("/api/tee-times?state=AZ&limit=500")["tee_times"]
                    if t.get("state") != "AZ"))

          print("\n== 3. VENUE DEDUPE: '-golfnow' slugs exposed? (want 0) ==")
          cs = get("/api/courses")["courses"]
          print("   courses:", len(cs), "| with -golfnow slug:",
                sum(1 for c in cs if "-golfnow" in (c["course_slug"] or "")))
          for c in cs:
              if c["course_slug"] in ("arrowhead-golf-club", "bella-ridge-golf-course",
                                      "cedaredge-golf-club", "ironbridge-golf-club"):
                  print("   ", c["course_slug"], "|", c.get("platform"), "|",
                        c.get("slots"), "slots |", c.get("state"), "|", c.get("city"))

          print("\n== 4. SUB-COURSES: Hyland / Kennedy display names ==")
          for slug in ("hyland-hills-golf-course", "kennedy-golf-course"):
              rows = get(f"/api/tee-times?course={slug}&limit=400")["tee_times"]
              names = {}
              same = {}
              for r in rows:
                  names[r["course_name"]] = names.get(r["course_name"], 0) + 1
                  same.setdefault(r["teetime"], []).append(r["course_name"])
              print("   ", slug, "->", names or "(no upcoming rows)")
              dupes = {k: v for k, v in same.items() if len(v) > 1}
              print("      same-time multi-course slots:", len(dupes),
                    "| example:", next(iter(dupes.items()), None))

          print("\n== 5. OPEN SPOTS coverage ==")
          miss = sum(1 for t in tt if t.get("open_spots") in (None, ""))
          byp = {}
          for t in tt:
              if t.get("open_spots") in (None, ""):
                  byp[t["platform"]] = byp.get(t["platform"], 0) + 1
          print(f"   {miss}/{len(tt)} rows with no open_spots | by platform:", byp)

          print("\n== 6. CITY coverage ==")
          print("   rows with no city:", sum(1 for t in tt if not t.get("city")),
                "| cities with parens:", sum(1 for t in tt if "(" in (t.get("city") or "")))

          print("\n== 7. BROADLANDS booking_url ==")
          b = get("/api/tee-times?course=broadlands-golf-course&limit=3")["tee_times"]
          print("   ", {t["booking_url"] for t in b} or "(no upcoming rows)")

          print("\n== 8. D1 backstop: elapsed rows still active (want ~0) ==")
          db = D1Rest()
          print("   ", db.execute(
              """SELECT COUNT(*) elapsed_active FROM tee_times
                   WHERE active=1 AND teetime < CASE WHEN state='AZ' THEN ? ELSE ? END""",
              [NOW["AZ"], NOW["CO"]])[0])
          print("   prune:", prune_past(db))
          PY

      - name: Recent workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            for WF in scrape.yml scrape-fast.yml prune-past.yml deploy-worker.yml; do
              echo "--- last 5 runs of ${WF} ---"
              gh run list --workflow "$WF" --limit 5 --json status,conclusion,createdAt,displayTitle \
                --template '{{range .}}{{.createdAt}} | {{.status}}/{{.conclusion}} | {{.displayTitle}}{{"\n"}}{{end}}' || true
            done
          } 2>&1 | tee probe-results/runstatus.txt

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/
          git commit -m "probe: verify deployed worker [skip ci]" || exit 0
          git push
