name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
  cancel-in-progress: true
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests
      - name: Verify D1 post-migration state (PK, labels, local times, spots)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python - <<'PY' 2>&1 | tee probe-results/postmigration.txt
          import os, requests, datetime as dt
          acct, db, tok = os.environ["CLOUDFLARE_ACCOUNT_ID"], os.environ["CLOUDFLARE_D1_DB_ID"], os.environ["CLOUDFLARE_API_TOKEN"]
          url = f"https://api.cloudflare.com/client/v4/accounts/{acct}/d1/database/{db}/query"
          def q(sql, params=None):
              r = requests.post(url, json={"sql": sql, "params": params or []},
                                headers={"Authorization": f"Bearer {tok}"}, timeout=30).json()
              if not r.get("success"): raise RuntimeError(r.get("errors"))
              return r["result"][0].get("results", [])
          print("== PK columns ==")
          print([x["name"] for x in q("PRAGMA table_info(tee_times)") if x.get("pk")])
          print("== row counts ==")
          print(q("SELECT COUNT(*) total, SUM(active) act FROM tee_times"))
          print("== hyland: same-time sub-course rows (want n up to 3 with labels) ==")
          for r in q("""SELECT teetime, COUNT(*) n, GROUP_CONCAT(course_label,' | ') labels
                        FROM tee_times WHERE course_slug LIKE '%hyland%' AND active=1
                        GROUP BY teetime HAVING n>1 LIMIT 4"""): print(" ", r)
          print("== hyland label histogram ==")
          for r in q("""SELECT course_label, COUNT(*) n FROM tee_times
                        WHERE course_slug LIKE '%hyland%' AND active=1 GROUP BY 1"""): print(" ", r)
          print("== kennedy label histogram ==")
          for r in q("""SELECT course_label, COUNT(*) n FROM tee_times
                        WHERE course_slug LIKE '%kennedy%' AND active=1 GROUP BY 1"""): print(" ", r)
          print("== teeitup teetime format (want local, no Z) ==")
          for r in q("SELECT teetime FROM tee_times WHERE platform='teeitup' AND active=1 ORDER BY last_seen_at DESC LIMIT 3"): print(" ", r)
          print("== teeitup rows still carrying Z (want 0) ==")
          print(q("SELECT COUNT(*) n FROM tee_times WHERE platform='teeitup' AND teetime LIKE '%Z'"))
          print("== chronogolf open_spots histogram (want a 1-4 spread, not all 4) ==")
          for r in q("SELECT open_spots, COUNT(*) n FROM tee_times WHERE platform='chronogolf' AND active=1 GROUP BY 1"): print(" ", r)
          print("== broadlands booking_url (want noteefy) ==")
          for r in q("SELECT DISTINCT booking_url FROM tee_times WHERE course_slug='broadlands-golf-course' AND active=1 LIMIT 2"): print(" ", r)
          print("== cities with parentheses (want 0) ==")
          print(q("SELECT COUNT(*) n FROM tee_times WHERE active=1 AND city LIKE '%(%'"))
          print("== labels present per platform ==")
          for r in q("""SELECT platform, COUNT(*) n FROM tee_times
                        WHERE active=1 AND course_label<>'' GROUP BY 1"""): print(" ", r)
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/postmigration.txt
          git commit -m "post-migration probe [skip ci]" || exit 0
          git push
