name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
  cancel-in-progress: true
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests

      - name: Find the live API URL from the public site
        run: |
          mkdir -p probe-results
          {
            echo "== workers.dev / api hosts referenced by www.oneteeapp.com =="
            curl -sL --max-time 25 https://www.oneteeapp.com \
              | grep -oE 'https://[a-z0-9.-]*(workers\.dev|oneteeapp\.com)[^"'"'"' )]*' \
              | sort -u | head -40
          } 2>&1 | tee probe-results/apiurl.txt

      - name: Diagnose past tee times (live API + D1), then prune
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python - <<'PY' 2>&1 | tee probe-results/pasttimes.txt
          import os, datetime as dt, zoneinfo, requests
          from scraper.d1 import D1Rest, prune_past

          db = D1Rest()
          q = db.execute
          den = dt.datetime.now(zoneinfo.ZoneInfo("America/Denver")).replace(tzinfo=None)
          phx = dt.datetime.now(zoneinfo.ZoneInfo("America/Phoenix")).replace(tzinfo=None)
          NOW_CO, NOW_AZ = den.isoformat(timespec="seconds"), phx.isoformat(timespec="seconds")
          print("now Denver:", NOW_CO, "| now Phoenix:", NOW_AZ)

          print("\n== BEFORE: active rows already elapsed, by platform ==")
          for r in q("""SELECT platform, COUNT(*) n, MIN(teetime) oldest, MAX(teetime) newest
                          FROM tee_times
                         WHERE active=1 AND teetime < CASE WHEN state='AZ' THEN ? ELSE ? END
                      GROUP BY 1 ORDER BY n DESC""", [NOW_AZ, NOW_CO]):
              print("  ", r)
          print("== BEFORE: totals ==")
          print("  ", q("""SELECT COUNT(*) elapsed_active FROM tee_times
                            WHERE active=1 AND teetime < CASE WHEN state='AZ' THEN ? ELSE ? END""",
                        [NOW_AZ, NOW_CO])[0],
                q("SELECT COUNT(*) total_active FROM tee_times WHERE active=1")[0])

          print("\n== BEFORE: worst offenders (most elapsed rows still active) ==")
          for r in q("""SELECT course_slug, state, COUNT(*) n, MIN(teetime) oldest,
                               MAX(last_seen_at) last_scrape
                          FROM tee_times
                         WHERE active=1 AND teetime < CASE WHEN state='AZ' THEN ? ELSE ? END
                      GROUP BY 1,2 ORDER BY n DESC LIMIT 15""", [NOW_AZ, NOW_CO]):
              print("  ", r)

          print("\n== Coal Creek rows (today) ==")
          for r in q("""SELECT teetime, active, open_spots, last_seen_at
                          FROM tee_times WHERE course_slug LIKE '%coal-creek%'
                           AND substr(teetime,1,10)=? ORDER BY teetime LIMIT 20""",
                     [den.date().isoformat()]):
              print("  ", r)

          print("\n== dates present among ACTIVE rows (is local-today even scraped?) ==")
          for r in q("""SELECT substr(teetime,1,10) d, COUNT(*) n, MAX(last_seen_at) last_scrape
                          FROM tee_times WHERE active=1 GROUP BY 1 ORDER BY 1"""):
              print("  ", r)

          print("\n== PRUNE ==")
          print("  ", prune_past(db))

          print("\n== AFTER: elapsed rows still active (want 0) ==")
          print("  ", q("""SELECT COUNT(*) elapsed_active FROM tee_times
                            WHERE active=1 AND teetime < CASE WHEN state='AZ' THEN ? ELSE ? END""",
                        [NOW_AZ, NOW_CO])[0],
                q("SELECT COUNT(*) total_active FROM tee_times WHERE active=1")[0])
          PY

      - name: Live API check (before/after prune is already applied above)
        run: |
          {
            echo "== live API: coal creek today =="
            for HOST in $(grep -oE 'https://[a-z0-9.-]*workers\.dev' probe-results/apiurl.txt | sort -u); do
              echo "--- ${HOST} ---"
              curl -sL --max-time 20 "${HOST}/api/health" | head -c 400; echo
              curl -sL --max-time 20 "${HOST}/api/tee-times?course=coal-creek-golf-course&limit=8" | head -c 1200; echo
            done
          } 2>&1 | tee probe-results/liveapi.txt

      - name: Recent workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            for WF in scrape.yml scrape-fast.yml prune-past.yml deploy-worker.yml; do
              echo "--- last 5 runs of ${WF} ---"
              gh run list --workflow "$WF" --limit 5 --json status,conclusion,createdAt,displayTitle \
                --template '{{range .}}{{.createdAt}} | {{.status}}/{{.conclusion}} | {{.displayTitle}}{{"\n"}}{{end}}' || true
            done
          } 2>&1 | tee probe-results/runstatus.txt

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/
          git commit -m "probe: past-time diagnosis [skip ci]" || exit 0
          git push
