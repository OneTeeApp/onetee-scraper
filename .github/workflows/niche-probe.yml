name: Niche platform probe
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/niche_probe.py", ".github/workflows/niche-probe.yml"]
permissions:
  contents: write
concurrency:
  group: niche-probe
  cancel-in-progress: true
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Diagnose Indian Peaks cps.golf (discover real courseIds vs pinned 10/11)
        run: |
          mkdir -p probe-results
          python - <<'PY' 2>&1 | tee probe-results/indianpeaks.txt
          import datetime as dt
          from playwright.sync_api import sync_playwright

          TENANT="indianpeaks"
          D=(dt.date.today()+dt.timedelta(days=1)).strftime("%a %b %d %Y")

          ZERO="00000000-0000-0000-0000-000000000000"
          # Full onlineresweb header profile (matches adapters/clubprophet._headers).
          FLOW=r"""
          async ([tenant, wid, cids, date, pinnedWid, pinnedCids]) => {
            const base="https://"+tenant+".cps.golf";
            const api=base+"/onlineres/onlineapi/api/v1/onlinereservation";
            const ZERO="00000000-0000-0000-0000-000000000000";
            const tr=await fetch(base+"/identityapi/myconnect/token/short",
              {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
               body:"client_id=onlinereswebshortlived"});
            if(tr.status!==200) return {stage:"token",status:tr.status};
            const token=(await tr.json()).access_token;
            const H=(websiteId)=>({Authorization:"Bearer "+token,
              "Accept":"application/json, text/plain, */*","Accept-Language":"en-US,en;q=0.9",
              "client-id":"onlineresweb","x-terminalid":"3","x-websiteid":websiteId||ZERO,
              "x-ismobile":"false","x-productid":"1","x-componentid":"1","x-siteid":"1",
              "x-moduleid":"7","x-timezoneid":"America/Denver","x-timezone-offset":"360",
              "x-requestid":crypto.randomUUID(),"Origin":base,
              "Referer":base+"/onlineresweb/search-teetime"});
            // 1) discovery
            const go=await fetch(api+"/GetAllOptions/"+tenant,{headers:H(ZERO)});
            let b={}; try{b=await go.json();}catch(e){}
            const co=(b.courseOptions||[]).map(c=>({courseId:c.courseId!==undefined?c.courseId:c.id,
              name:c.courseName||c.name, holes:c.holes}));
            const discWid=b.webSiteId||(b.reservationOptions||{}).webSiteId;
            const realIds=co.map(c=>c.courseId).filter(x=>x!==undefined&&x!==null);
            // helper to query TeeTimes for a (wid,cids)
            const teetimes=async(useWid,useCids)=>{
              const txid=crypto.randomUUID();
              await fetch(api+"/RegisterTransactionId",{method:"POST",
                headers:{...H(useWid),"Content-Type":"application/json"},
                body:JSON.stringify({transactionId:txid})});
              const url=api+`/TeeTimes?searchDate=${encodeURIComponent(date)}&holes=0&numberOfPlayer=0`
                +`&courseIds=${useCids}&searchTimeType=0&transactionId=${txid}&teeOffTimeMin=0&teeOffTimeMax=23`
                +`&isChangeTeeOffTime=true&teeSheetSearchView=5&classCode=R&defaultOnlineRate=N`
                +`&isUseCapacityPricing=false&memberStoreId=1&searchType=1`;
              const tt=await fetch(url,{headers:H(useWid)});
              let c=[]; try{c=(await tt.json()).content||[];}catch(e){}
              return {status:tt.status,n:c.length,sample:c.slice(0,3).map(s=>({t:s.startTime,cid:s.courseId,name:s.courseName}))};
            };
            const out={stage:"ok", getAllOptionsStatus:go.status, discWebSiteId:discWid, courseOptions:co, realIds};
            // 2) pinned registry ids (what the scraper currently uses)
            out.pinned = await teetimes(pinnedWid, pinnedCids);
            // 3) discovered ids
            if(realIds.length) out.discovered = await teetimes(discWid||pinnedWid, realIds.join(","));
            return out;
          }
          """
          PINNED_WID="f04abbc1-368f-40f4-096d-08d89aea9574"
          with sync_playwright() as pw:
            for attempt in range(3):
              br=pw.chromium.launch(args=["--no-sandbox"])
              try:
                pg=br.new_page()
                pg.goto(f"https://{TENANT}.cps.golf/onlineresweb/search-teetime",wait_until="domcontentloaded",timeout=35000)
                pg.wait_for_timeout(6000)
                r=pg.evaluate(FLOW,[TENANT,"", "", D, PINNED_WID, "10,11"])
                import json as _j
                print(_j.dumps(r, indent=1))
                if r.get("stage")=="ok": br.close(); break
                br.close()
              except Exception as e:
                print("ERR",type(e).__name__,e); br.close()
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/indianpeaks.txt
          git commit -m "indian peaks cps probe [skip ci]" || exit 0
          git push
