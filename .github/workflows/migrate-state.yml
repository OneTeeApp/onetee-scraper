name: Migrate D1 (state column + backfill)

# One-time: adds the state column, creates the new indexes, and backfills state
# on existing rows from the registry. Idempotent — safe to re-run. (Ongoing,
# every scrape push also ensures the column/indexes via init_schema, and new
# rows carry state from the scraper, so this is only needed once to fill legacy
# rows.)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/migrate-state.yml"]

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Migrate + backfill
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: python -m scraper.d1 migrate --registry registry.json
