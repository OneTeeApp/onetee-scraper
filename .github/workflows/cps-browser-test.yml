name: CPS browser probe (diagnostic)

# One-off diagnostic: does a real headless Chromium clear the cps.golf WAF from
# GitHub's datacenter IP where plain requests gets 403? Triggered manually or by
# touching the probe script. Read the RESULT lines in the log.

on:
  workflow_dispatch: {}
  push:
    paths:
      - "scripts/cps_browser_probe.py"
      - ".github/workflows/cps-browser-test.yml"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Run probe
        run: python scripts/cps_browser_probe.py
