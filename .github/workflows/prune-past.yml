name: Prune elapsed tee times

# BACKSTOP ONLY. The primary pruner is the Worker's own cron trigger
# (worker/wrangler.toml [triggers] + the `scheduled` handler in
# worker/index.js), which runs every 5 minutes on Cloudflare's scheduler.
#
# This workflow was written first, with a */10 cron, and GitHub did not fire it
# a single time in the 80 minutes it sat on main — consistent with the fast
# scrape, whose */5 cron actually executes about every 5 HOURS. GitHub's
# scheduler is explicitly best-effort and deprioritises frequent crons under
# load, so it cannot be the thing standing between a golfer and a tee time that
# started an hour ago. Kept at an hourly cadence as a second pair of eyes and
# for manual dispatch when something looks stale.
#
# Why pruning is needed at all: a tee time that has already started can't be
# booked, but nothing deactivates it. d1.sync only touches courses present in
# THAT scrape, so a course that errors keeps its rows alive indefinitely; and
# time simply passes between runs — the scrape that wrote a 7:20am slot was
# correct at 7:06am and wrong by 7:21am. The read API hides past slots, but
# pruning fixes the DATA, so every consumer is correct, not just the website.

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: prune-past
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Deactivate rows whose tee time has passed in the course's timezone
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: python -m scraper.d1 prune
