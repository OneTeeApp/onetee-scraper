name: Coverage snapshot
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["scripts/coverage.py", ".github/workflows/coverage.yml"]
permissions:
  contents: write
concurrency:
  group: coverage
jobs:
  cov:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests
      - name: Snapshot
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DB_ID: ${{ secrets.CLOUDFLARE_D1_DB_ID }}
        run: |
          mkdir -p probe-results
          python scripts/coverage.py 2>&1 | tee probe-results/coverage.txt
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/coverage.txt
          git commit -m "coverage snapshot [skip ci]" || exit 0
          git push
