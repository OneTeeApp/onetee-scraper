name: Club Caddie probe

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/cc_probe.py"
      - ".github/workflows/cc-probe.yml"

permissions:
  contents: write

concurrency:
  group: cc-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium
      - name: Run probe
        run: |
          mkdir -p probe-results
          python scripts/cc_probe.py 2>&1 | tee probe-results/cc.txt
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add probe-results/cc.txt
          git commit -m "cc probe [skip ci]" || { echo "no changes"; exit 0; }
          git push
