name = "onetee-api"
main = "index.js"
compatibility_date = "2026-07-01"

# Prune elapsed tee times every 5 minutes. Cloudflare's scheduler actually
# honours this; the equivalent GitHub Actions cron did not fire once in over an
# hour. See the `scheduled` handler in index.js.
[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"                 # available as env.DB in the Worker
database_name = "onetee-teetimes"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
